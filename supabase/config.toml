# Supabase local dev config. Generated lightly here so the CLI has a starting
# point; run `supabase init` later if you need the full file with all defaults.

project_id = "neuflow"

[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["neuflow://"]
jwt_expiry = 3600
enable_signup = true
